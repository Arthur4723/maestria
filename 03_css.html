<style>
/* =========================================
   ESTILOS GLOBALES Y VARIABLES CORE
   ========================================= */
:root {
  --bg-body: #f8fafc;
  --bg-sidebar: #ffffff;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --primary: #2563eb;
  --border: #e2e8f0;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-body);
  color: var(--text-main);
}

/* =========================================
   LAYOUT PRINCIPAL
   ========================================= */
.app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.main {
  flex: 1;
  overflow-y: auto;
  position: relative;
}

.view-wrap { 
  padding: 32px; 
  max-width: 1400px; 
  margin: 0 auto; 
}

/* =========================================
   BARRA LATERAL (SIDEBAR) & ESTADOS
   ========================================= */
.sidebar {
  width: 250px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 12px;
  transition: width 0.3s ease;
  overflow-x: hidden;
}

/* Estado Contraído */
.sidebar.collapsed { width: 70px; }
.sidebar.collapsed .brand-text,
.sidebar.collapsed .nav-text,
.sidebar.collapsed .cloud-status { display: none; }
.sidebar.collapsed .toggle-btn { margin: 0 auto; display: block; }
.sidebar.collapsed .nav-btn { justify-content: center; padding: 12px 0; }

.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  padding: 0 8px;
}

.brand-text {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.toggle-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-main);
}

.nav-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: transparent;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s;
  text-align: left;
  white-space: nowrap;
}

.nav-btn:hover { background: #f1f5f9; color: var(--primary); }
.nav-btn.active { background: #eff6ff; color: var(--primary); font-weight: 700; }
.nav-icon { font-size: 20px; }

.cloud-status {
  margin-top: auto;
  padding: 12px;
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* =========================================
   PANTALLA DE CARGA (LOADER GLOBAL)
   ========================================= */
.loader-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.loader-card {
  background: #fff;
  padding: 24px 40px;
  border-radius: 16px;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
  text-align: center;
}

.loader-icon { font-size: 32px; margin-bottom: 12px; }
.loader-card h3 { margin: 0 0 8px 0; color: var(--text-main); font-size: 18px; }
.loader-card p { margin: 0; font-size: 14px; color: var(--text-muted); }
</style>
