<div class="grid-2">
  <section class="panel">
    <h3 class="form-title">Nueva nota</h3>
    <select id="nota_curso"></select>
    <input id="nota_sesion" placeholder="ID de sesión (opcional)">
    <input id="nota_titulo" placeholder="Título de la nota">
    <textarea id="nota_contenido" rows="10" placeholder="Escribe tus apuntes, ideas o resumen..."></textarea>
    <button class="btn-pri" onclick="NotasPage.crear()">Guardar nota</button>
  </section>

  <section class="panel">
    <div class="toolbar">
      <button class="btn-sec" onclick="NotasPage.load()">Refrescar</button>
    </div>
    <h3 class="list-title">Listado de notas</h3>
    <div id="listaNotas" class="list"></div>
  </section>
</div>
