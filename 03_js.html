<script>
/**
 * APP CORE - MANEJADOR DE ESTADO GLOBAL Y RUTAS
 */
const App = {
  State: {
    config: {},
    ciclos: [],
    curricula: [],
    cursosActivos: [],
    sesiones: [], // <-- NUEVO: Inicializamos las sesiones en la RAM
    currentView: null
  },

  UI: {
    toggleSidebar: function() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    },
    showLoader: function(title, sub) {
      document.getElementById('loaderTitle').innerText = title || 'Cargando...';
      document.getElementById('loaderSub').innerText = sub || '';
      document.getElementById('loaderOverlay').style.display = 'flex';
    },
    hideLoader: function() {
      document.getElementById('loaderOverlay').style.display = 'none';
    }
  },

  Router: {
    go: function(viewName, params = null) {
      // Resaltar botón principal
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-nav-${viewName}`);
      if(activeBtn) activeBtn.classList.add('active');

      // Extraer el template
      const template = document.getElementById(`tpl-${viewName}`);
      if (!template) {
        console.error(`Error Arquitectónico: No existe el template tpl-${viewName}`);
        return;
      }

      // Inyectar vista
      const container = document.getElementById('viewContainer');
      container.innerHTML = ''; 
      container.appendChild(template.content.cloneNode(true));

      // Inicializar módulo
      setTimeout(() => {
        if (viewName === 'general' && typeof ModuleGeneral !== 'undefined') {
          ModuleGeneral.init();
        } else if (viewName === 'cursos' && typeof ModuleCursos !== 'undefined') {
          ModuleCursos.init(params);
        }
      }, 0);

      App.State.currentView = viewName;
    }
  },

  Init: function() {
    App.UI.showLoader('Sincronizando', 'Extrayendo Núcleo Operativo...');

    google.script.run
      .withSuccessHandler(function(response) {
        if(response.success || response.status === "success") {
          App.State.config = response.data.config || {};
          App.State.ciclos = response.data.ciclos || [];
          App.State.curricula = response.data.curricula || [];
          App.State.cursosActivos = response.data.cursosActivos || [];
          App.State.sesiones = response.data.sesiones || [];

          App.UI.hideLoader();
          App.Router.go('cursos');
        } else {
          App.UI.showLoader('Error', 'No se pudo leer la base de datos.');
          console.error(response.message);
        }
      })
      .withFailureHandler(function(error) {
        App.UI.showLoader('Error Crítico', 'Falla en la conexión de servidor.');
        console.error(error);
      })
      .getCoreDataSPA(); // <--- NUEVA FUNCIÓN INMUNE
  }
};

// Arrancar el sistema cuando el DOM global esté listo
document.addEventListener('DOMContentLoaded', App.Init);
</script>
